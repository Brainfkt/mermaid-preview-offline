name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify extension
        run: npm run verify

      - name: Package VSIX
        run: npm run package:vsix

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: mermaid-preview-offline-${{ github.sha }}
          path: artifacts/*.vsix
          if-no-files-found: error
