name: Publish to VS Code Marketplace

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Enter PUBLISH to confirm the Marketplace release'
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    if: inputs.confirmation == 'PUBLISH'
    runs-on: ubuntu-latest
    environment: marketplace
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish extension
        run: npm run publish:marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
