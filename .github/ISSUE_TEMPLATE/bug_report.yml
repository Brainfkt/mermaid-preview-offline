name: Bug report
description: Report a reproducible problem in Mermaid Preview Offline
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe what you observed and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: diagram
    attributes:
      label: Minimal diagram
      description: Add a minimal Mermaid example with no confidential data.
      render: mermaid
    validations:
      required: true
  - type: input
    id: vscode
    attributes:
      label: VS Code version
    validations:
      required: true
  - type: input
    id: extension
    attributes:
      label: Extension version
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
